name: studio_social
description: Mobile-first camera, media editor, cloud projects, and social feed.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.12.0+1
  cloud_firestore: ^6.6.0
  cloud_functions: ^6.3.3
  cupertino_icons: ^1.0.8
  crypto: ^3.0.3
  firebase_auth: ^6.5.4
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  firebase_storage: ^13.4.3
  image_picker: ^1.2.2
  path: ^1.9.0
  path_provider: ^2.1.4
  sqflite: ^2.4.1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
